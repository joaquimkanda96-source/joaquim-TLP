<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#dbeafe; /* NOVA COR DO FUNDO */
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#1e3a8a;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1 a{
color:#fff;
text-decoration:none;
font-size:20px;
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

/* SOBRE */

.sobre{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.sobre h1{
margin-bottom:20px;
color:#1e3a8a;
}

.sobre p{
line-height:1.6;
color:#1e293b;
}

/* TRIMESTRES */

.trimestres{
width:350px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.trimestres h2{
text-align:center;
margin-bottom:20px;
color:#1e3a8a;
}

.trimestres a{
display:block;
margin-bottom:15px;
padding:15px;
text-align:center;
background:#1e3a8a;
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
border-radius:8px;
transition:0.3s;
}

.trimestres a:hover{
background:#60a5fa;
color:black;
}

/* FOOTER */

footer{
background:#020617; /* NOVA COR DO RODAPÉ */
color:white;
text-align:center;
padding:20px;
font-size:14px;
}

/* RESPONSIVO */

@media(max-width:768px){

main{
flex-direction:column;
}

}

</style>
</head>
