<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos Cadastrados</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* FUNDO */
    body {
      background: #e0f7fa; /* azul claro */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* CABEÇALHO */
    .header {
      position: sticky;
      top: 0;
      background: #0f172a;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 a {
      color: #fff;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      text-decoration: none;
      padding: 8px 16px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      font-weight: bold;
    }

    /* CONTAINER DA TABELA */
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      flex: 1; /* Faz a tabela ocupar o espaço disponível */
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #0f172a;
      color: #fff;
    }

    /* RODAPÉ */
    footer {
      background: #0f172a;
      padding: 20px;
      text-align: center;
    }

    footer a {
      text-decoration: none;
      padding: 10px 20px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      margin: 5px;
      display: inline-block;
      font-weight: bold;
      transition: 0.3s;
    }

    footer a:hover {
      background: #38bdf8;
      color: #000;
    }
  </style>
</head>

<body>

<header class="header">
  <h1><a href="../index.html">HOME</a></h1>
</header>

<div class="container">
  <h2>Produtos Cadastrados</h2>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Preço</th>
        <th>Quantidade</th>
      </tr>
    </thead>
    <tbody id="tabelaProdutos"></tbody>
  </table>
</div>

<!-- RODAPÉ COM TRIMESTRES -->
<footer>
  <a href="trimestre1.html">I </a>
  <a href="trimestre2.html">II </a>
  <a href="trimestre3.html">III </a>
</footer>

<script>
  const tabela = document.getElementById("tabelaProdutos");
  const produtos = JSON.parse(localStorage.getItem("produtos")) || [];

  produtos.forEach(produto => {
    const linha = document.createElement("tr");

    linha.innerHTML = `
      <td>${produto.nome}</td>
      <td>${produto.preco}</td>
      <td>${produto.quantidade}</td>
    `;

    tabela.appendChild(linha);
  });
</script>

</body>
</html>
