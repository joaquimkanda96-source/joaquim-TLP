<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Trimestre</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #e0f7fa; /* Fundo azul claro */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* CABEÇALHO */
    .header {
      position: sticky;
      top: 0;
      background: #0f172a;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .header h1 a {
      color: #fff;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      text-decoration: none;
      padding: 8px 16px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      font-weight: bold;
    }

    /* RODAPÉ */
    footer {
      background: #0f172a;
      padding: 20px;
      text-align: center;
      margin-top: auto; /* faz o rodapé ficar no fim */
    }

    footer a {
      text-decoration: none;
      padding: 10px 20px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      margin: 5px;
      display: inline-block;
      font-weight: bold;
      transition: 0.3s;
    }

    footer a:hover {
      background: #38bdf8;
      color: #000;
    }
  </style>
</head>

<body>

<header class="header">
  <h1><a href="../index.html">HOME</a></h1>

  <nav>
    <a href="trimestre1.html">I Trim.</a>
    <a href="trimestre2.html">II Trim.</a>
    <a href="trimestre3.html">III Trim.</a>
  </nav>
</header>

<!-- Conteúdo da página -->
<main style="flex:1"></main>

<!-- RODAPÉ -->
<footer>
  <a href="trimestre1.html">I Trim.</a>
  <a href="trimestre2.html">II Trim.</a>
  <a href="trimestre3.html">III Trim.</a>
</footer>

</body>
</html>
