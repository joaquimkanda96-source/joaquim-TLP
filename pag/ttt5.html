<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Trimestre</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* COR DO FUNDO */
    body {
      background: #e0f7fa;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* CABEÇALHO */
    .header {
      position: sticky;
      top: 0;
      background: #0f172a;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 a {
      color: #fff;
      text-decoration: none;
    }

    /* RODAPÉ COM TRIMESTRES */
    footer {
      background: #0f172a;
      padding: 20px;
      text-align: center;
      margin-top: auto;
    }

    footer a {
      text-decoration: none;
      padding: 10px 20px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      margin: 5px;
      display: inline-block;
      font-weight: bold;
      transition: 0.3s;
    }

    footer a:hover {
      background: #38bdf8;
      color: #000;
    }

    /* PRINCIPAL */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
      text-align: center;
      font-size: 18px;
      color: #0f172a;
    }
  </style>
</head>

<body>

<header class="header">
  <h1><a href="../index.html">HOME</a></h1>
</header>

<footer>
  <a href="trimestre1.html">I</a>
  <a href="trimestre2.html">II</a>
  <a href="trimestre3.html">III</a>
</footer>

</body>
</html>
