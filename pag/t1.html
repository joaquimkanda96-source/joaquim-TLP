<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Trimestre</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* COR DE FUNDO */
    body {
      background: #e0f7fa; /* azul claro */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* CABEÇALHO */
    .header {
      position: sticky;
      top: 0;
      background: #0f172a;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 a {
      color: #fff;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      text-decoration: none;
      padding: 8px 16px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      font-weight: bold;
    }

    /* CONTEÚDO CENTRAL */
    .conteudo {
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 800px;
      margin: auto;
      flex: 1; /* faz o main crescer para empurrar o rodapé */
    }

    .conteudo img,
    .conteudo video,
    .conteudo audio {
      width: 100%;
      border-radius: 10px;
    }

    /* RODAPÉ */
    footer {
      background: #0f172a;
      padding: 20px;
      text-align: center;
    }

    footer a {
      text-decoration: none;
      padding: 10px 20px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      margin: 5px;
      display: inline-block;
      font-weight: bold;
      transition: 0.3s;
    }

    footer a:hover {
      background: #38bdf8;
      color: #000;
    }
  </style>
</head>

<header class="header">

</html>
