<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Trimestre</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

/* COR DO FUNDO */
body {
  background: #e0f2fe;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
.header{
  position: sticky;
  top: 0;
  background: #0f172a;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 a{
  color: #fff;
  text-decoration: none;
}

/* MENU NO HEADER */
nav a{
  text-decoration: none;
  padding: 8px 16px;
  background: #1e293b;
  color: #fff;
  border-radius: 6px;
  font-weight: bold;
  margin-left: 5px;
}

nav a:hover{
  background: #38bdf8;
  color: #000;
}

/* CONTEÚDO PRINCIPAL */
main{
  flex: 1;
  max-width: 1100px;
  margin: 30px auto;
  padding: 20px;
}

/* RODAPÉ */
footer{
  background: #0f172a;
  padding: 25px;
  text-align: center;
}

footer a{
  text-decoration: none;
  padding: 10px 20px;
  background: #1e293b;
  color: white;
  border-radius: 6px;
  margin: 5px;
  display: inline-block;
  font-weight: bold;
}

footer a:hover{
  background: #38bdf8;
  color: black;
}

</style>
</head>

<body>

<header class="header">
  <h1><a href="../index.html">HOME</a></h1>
</header>

<main>
  <h2 style="text-align:center; color:#0f172a;">Conteúdo do I Trimestre</h2>
  <p style="text-align:center;">Aqui você pode colocar informações, textos, imagens ou listas do primeiro trimestre.</p>
</main>

</footer>

</body>
</html>
