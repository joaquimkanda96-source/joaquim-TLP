<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* COR DO FUNDO ALTERADA */
body{
background:#e0f2fe;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#0f172a;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1 a{
color:#fff;
text-decoration:none;
}

/* CONTAINER */

.container{
width:90%;
margin:auto;
}

.menu{
background:#8BC34A;
text-align:center;
padding:20px;
font-weight:bold;
font-size:20px;
margin-top:10px;
}

.sidebar{
background:#8BC34A;
text-align:center;
padding:50px;
margin-top:5px;
font-weight:bold;
}

.fotos{
display:flex;
justify-content:space-around;
margin:30px 0;
}

.foto{
width:150px;
height:150px;
background:#8BC34A;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.textos{
display:flex;
justify-content:space-between;
}

.texto{
width:48%;
background:#8BC34A;
padding:40px;
text-align:center;
font-weight:bold;
}

/* RODAPÉ */

footer{
background:#0f172a;
text-align:center;
padding:25px;
margin-top:20px;
}

footer a{
text-decoration:none;
padding:10px 20px;
background:#1e293b;
color:white;
border-radius:6px;
margin:5px;
display:inline-block;
font-weight:bold;
}

footer a:hover{
background:#38bdf8;
color:black;
}

</style>
</head>

</div>

</div>
