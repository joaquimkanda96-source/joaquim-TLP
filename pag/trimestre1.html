<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Trimestre</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#dbeafe; /* NOVA COR DO FUNDO */
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#1e3a8a;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1 a{
color:#fff;
text-decoration:none;
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

/* BOX */

.trimestre-box{
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.trimestre-box h2{
margin-bottom:25px;
color:#1e3a8a;
}

/* TRABALHOS */

.trabalhos{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center; /* CENTRALIZA T1 T2 T3 */
}

.trabalhos a{
padding:15px 20px;
background:#1e3a8a;
color:#fff;
text-decoration:none;
font-weight:bold;
border-radius:8px;
transition:0.3s;
}

.trabalhos a:hover{
background:#60a5fa;
color:#000;
}

/* FOOTER */

footer{
background:#020617;
padding:20px;
text-align:center;
}

footer a{
text-decoration:none;
padding:10px 18px;
background:#1e3a8a;
color:white;
border-radius:6px;
margin:5px;
display:inline-block;
font-weight:bold;
}

footer a:hover{
background:#60a5fa;
color:black;
}

</style>
</head>

<body>

<header class="header">
<h1><a href="../index.html">HOME</a></h1>
</header>

<main>

<div class="trimestre-box">

<h2>I Trimestre</h2>

<div class="trabalhos">

<a href="t2.html">T2</a>

<a href="t4.html">T4</a>
<a href="t5.html">T5</a>
<a href="t6.html">T6</a>

</div>

</div>

</main>

<footer>

<a href="trimestre1.html">I</a>
<a href="trimestre2.html">II</a>
<a href="trimestre3.html">III</a>

</footer>

</body>
</html>
